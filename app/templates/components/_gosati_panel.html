<!-- GoSATI Integration -->
<div class="gosati-section">
    <div class="panel-subheader">
        <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px; margin-right: 4px;">
                <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            GoSATI / Zangari
        </h3>
    </div>
    <div class="gosati-form" id="gosati-form">
        <div class="form-group">
            <label for="gosati-tipo">Tipo de consulta</label>
            <select class="input" id="gosati-tipo">
                <option value="prestacao_contas">Prestação de Contas</option>
                <option value="fluxo_caixa">Fluxo de Caixa</option>
                <option value="inadimplencia">Inadimplência</option>
                <option value="periodo_fechamento">Período de Fechamento</option>
                <option value="previsao_orcamentaria">Previsão Orçamentária</option>
                <option value="relacao_lancamentos">Relação de Lançamentos</option>
                <option value="relacao_pendentes">Relação de Pendentes</option>
            </select>
        </div>
        <div class="form-group" style="position: relative;">
            <label for="gosati-cond-search">Condomínio</label>
            <input type="text" class="input" id="gosati-cond-search" placeholder="Digite código ou nome..." autocomplete="off" oninput="GoSati.searchCond(this.value)" onfocus="GoSati.searchCond(this.value)">
            <input type="hidden" id="gosati-cond">
            <div class="autocomplete-list hidden" id="gosati-cond-list"></div>
        </div>
        <div class="form-row">
            <div class="form-group form-group-half">
                <label for="gosati-mes">Mês</label>
                <select class="input" id="gosati-mes">
                    <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                    <option value="3">Março</option><option value="4">Abril</option>
                    <option value="5">Maio</option><option value="6">Junho</option>
                    <option value="7">Julho</option><option value="8">Agosto</option>
                    <option value="9">Setembro</option><option value="10">Outubro</option>
                    <option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
            </div>
            <div class="form-group form-group-half">
                <label for="gosati-ano">Ano</label>
                <input type="number" class="input" id="gosati-ano" value="2026">
            </div>
        </div>
        <div class="gosati-btn-row" style="display:flex; gap:6px;">
            <button class="btn btn-outlined btn-sm" style="flex:1;" onclick="GoSati.query()" id="btn-gosati">
                Consultar GoSATI
            </button>
            <button class="btn btn-outlined btn-sm btn-danger-outline" style="width:auto; padding:0 10px;" onclick="GoSati.reset()" id="btn-gosati-reset" title="Limpar dados GoSATI e cache do chat">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: -2px;">
                    <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
            </button>
        </div>
    </div>
    <!-- Comprovantes section (appears after prestação de contas) -->
    <div id="comprovantes-section" style="display:none; margin-top: 12px;">
        <div class="panel-subheader" style="margin-bottom: 8px;">
            <h4 style="font-size: 13px; color: var(--text-secondary);">Comprovantes disponíveis</h4>
        </div>
        <div id="comprovantes-list" style="max-height: 200px; overflow-y: auto;"></div>
        <button class="btn btn-outlined btn-sm btn-block" onclick="GoSati.downloadSelected()" id="btn-comprovantes" style="margin-top: 8px;">
            Baixar Selecionados
        </button>
    </div>
</div>
