<div class="panel-header">
    <h2>Conversa</h2>
    <button class="btn-icon btn-ghost" title="Opções">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
        </svg>
    </button>
</div>

<!-- Mensagens -->
<div class="chat-messages" id="chat-messages">
    <!-- Welcome screen -->
    <div class="chat-welcome" id="chat-welcome">
        <div class="chat-welcome-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 3v18m-6-6 6 6 6-6M4.2 12.2 12 4l7.8 8.2"/>
            </svg>
        </div>
        <h2 id="chat-welcome-title">Untitled notebook</h2>
        <p id="chat-welcome-sources">0 fontes</p>
    </div>
</div>

<!-- Input -->
<div class="chat-input-area">
    <div class="chat-input-wrapper">
        <textarea id="chat-input" rows="1" placeholder="Comece a digitar..." onkeydown="Chat.handleKey(event)"></textarea>
        <span class="chat-input-meta" id="chat-source-count">0 fontes</span>
        <button class="btn-send" id="btn-send" onclick="Chat.send()" title="Enviar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m5 12 14-7-4 7 4 7z"/>
            </svg>
        </button>
    </div>
</div>
