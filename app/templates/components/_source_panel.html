<div class="panel-header">
    <h2>Fontes</h2>
    <button class="btn-icon btn-ghost" title="Alternar painel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
    </button>
</div>

<div class="panel-body">
    <!-- Botão Adicionar Fonte -->
    <button class="add-source-btn" onclick="Sources.showUploadModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar fontes
    </button>

    <!-- Pesquisa Web (placeholder) -->
    <div style="background: var(--bg-surface); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 16px;">
        <div style="display:flex; align-items:center; gap:8px; color: var(--text-secondary); font-size: 0.85rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
            Pesquise novas fontes na web
        </div>
    </div>

    <!-- Lista de fontes -->
    <div id="source-list">
        <!-- Preenchido por JS -->
    </div>

    <!-- Estado vazio -->
    <div class="source-empty" id="source-empty">
        <div class="source-empty-icon">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
            </svg>
        </div>
        <p><strong>As fontes salvas vão aparecer aqui</strong></p>
        <p>Clique em "Adicionar fontes" para incluir arquivos PDF, de texto, ou dados do GoSATI.</p>
    </div>

    <!-- GoSATI Section -->
    {% include "components/_gosati_panel.html" %}
</div>
